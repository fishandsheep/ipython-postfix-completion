name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              version = tomllib.load(pyproject)["project"]["version"]

          tag = os.environ["GITHUB_REF_NAME"]
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Release tag {tag!r} does not match package version {version!r}; "
                  f"expected {expected_tag!r}."
              )
          PY

      - name: Install build tools and test dependencies
        run: python -m pip install --upgrade build twine ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ipython-postfix-completion
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
